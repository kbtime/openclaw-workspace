<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器导航 - 设计稿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="min-h-screen">
    
    <!-- ========== 页面 1: 登录页 ========== -->
    <div class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-8 bg-zinc-900/80 backdrop-blur rounded-3xl border border-zinc-800">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="text-3xl">🖥️</span>
                </div>
                <h1 class="text-2xl font-bold text-white">服务器导航</h1>
                <p class="text-zinc-400 mt-2">x.738402.xyz 服务入口</p>
            </div>
            <form class="space-y-5">
                <div>
                    <label class="block text-zinc-400 mb-2 text-sm font-medium">用户名</label>
                    <input type="text" class="w-full px-4 py-3.5 bg-zinc-800/50 border border-zinc-700 rounded-xl text-white focus:outline-none focus:border-blue-500 focus:bg-zinc-800 transition-all" placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-zinc-400 mb-2 text-sm font-medium">密码</label>
                    <input type="password" class="w-full px-4 py-3.5 bg-zinc-800/50 border border-zinc-700 rounded-xl text-white focus:outline-none focus:border-blue-500 focus:bg-zinc-800 transition-all" placeholder="请输入密码">
                </div>
                <button type="button" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold rounded-xl transition-all shadow-lg shadow-blue-500/25">
                    登 录
                </button>
            </form>
        </div>
    </div>
