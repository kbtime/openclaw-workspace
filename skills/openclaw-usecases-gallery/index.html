                    "每日读取过去 24 小时的新闻邮件",
                    "生成最重要内容的摘要和链接",
                    "根据反馈优化摘要质量"
                ],
                setup: `1. 从 ClawdHub 安装 Gmail OAuth skill
2. [可选] 创建专用 Gmail 用于订阅
3. 配置每日 cron 任务和摘要偏好`
            },
            {
                id: 13,
                title: "Overnight Mini-App Builder",
                category: "automation",
                categoryName: "自动化",
                icon: "🌙",
                color: "cat-automation",
                desc: "夜间迷你应用构建器，让 AI 在你睡觉时构建小型应用。",
                skills: ["None"],
                painPoint: "想自动化繁琐工作，但没有时间开发小工具。",
                whatItDoes: [
                    "AI 主动理解你的目标和策略",
                    "夜间自动构建 MVP 应用",
                    "每天早上有新惊喜"
                ],
                setup: `直接告诉 OpenClaw 你的目标：
"根据我的目标 [描述]，夜间帮我构建一个 MVP 应用，不要过度复杂化。"

每天早上醒来查看新应用！`
            }
        ];

        // Render Gallery
        function renderGallery(filter = 'all') {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            usecases.forEach(usecase => {
                if (filter !== 'all' && usecase.category !== filter) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(usecase);
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon ${usecase.color}">${usecase.icon}</div>
                        <div class="card-content">
                            <div class="card-category">${usecase.categoryName}</div>
                            <div class="card-title">${usecase.title}</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-desc">${usecase.desc}</div>
                        <div class="card-meta">
                            ${usecase.skills.map(skill => `<span class="tag skill">${skill}</span>`).join('')}
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Filter Buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery(btn.dataset.filter);
            });
        });

        // Modal Functions
        function openModal(usecase) {
            document.getElementById('modal-icon').textContent = usecase.icon;
            document.getElementById('modal-icon').className = 'modal-icon ' + usecase.color;
            document.getElementById('modal-category').textContent = usecase.categoryName;
            document.getElementById('modal-title').textContent = usecase.title;
            
            document.getElementById('modal-body').innerHTML = `
                <div class="modal-section">
                    <h3>💡 痛点</h3>
                    <p>${usecase.painPoint}</p>
                </div>
                <div class="modal-section">
                    <h3>🎯 功能</h3>
                    <ul>
                        ${usecase.whatItDoes.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
                <div class="modal-section">
                    <h3>🛠 所需 Skill</h3>
                    <div class="card-meta">
                        ${usecase.skills.map(skill => `<span class="tag skill">${skill}</span>`).join('')}
                    </div>
                </div>
                <div class="modal-section">
                    <h3>⚡ 配置方法</h3>
                    <div class="code-block">${usecase.setup}</div>
                </div>
            `;
            
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Initial render
        renderGallery();
    </script>
</body>
</html>
