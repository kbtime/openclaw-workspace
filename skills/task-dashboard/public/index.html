<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=1771992672">
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">🤖</span>
                <span class="title">Task Dashboard</span>
            </div>
            <div class="header-right">
                <span class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">连接中</span>
                </span>
                <span class="user-info" id="userInfo"></span>
                <button class="btn-logout" onclick="logout()">退出</button>
            </div>
        </header>

        <!-- Status Bar -->
        <section class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-label">Gateway</span>
                <span class="status-value" id="statusGateway">--</span>
            </div>
            <div class="status-item">
                <span class="status-label">User Token</span>
                <span class="status-value" id="statusUserToken">--</span>
            </div>
            <div class="status-item">
                <span class="status-label">Tenant Token</span>
                <span class="status-value" id="statusTenantToken">--</span>
            </div>
            <div class="status-item">
                <span class="status-label">Nginx</span>
                <span class="status-value" id="statusNginx">--</span>
            </div>
            <div class="status-item">
                <span class="status-label">Docker</span>
                <span class="status-value" id="statusDocker">--</span>
            </div>
        </section>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Cron Jobs Panel -->
            <section class="panel cron-panel">
                <div class="panel-header">
                    <h2>⏰ 定时任务</h2>
                    <span class="badge" id="cronCount">0</span>
                </div>
                <div class="panel-body" id="cronList">
                    <p class="loading">加载中...</p>
                </div>
            </section>

            <!-- Execution Records Panel -->
            <section class="panel records-panel">
                <div class="panel-header">
                    <h2>📊 最近执行记录</h2>
                </div>
                <div class="panel-body" id="recordsList">
                    <p class="loading">加载中...</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <span id="lastUpdate">最后更新: --</span>
        </footer>
    </div>

    <script src="/app.js?v=1771992672"></script>
</body>
</html>
